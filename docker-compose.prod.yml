services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/garmincoach.db
      - SECRET_KEY=${SECRET_KEY}
      - GARMINCOACH_SECRET_KEY=${GARMINCOACH_SECRET_KEY}
    volumes:
      - backend_data:/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend_data:
