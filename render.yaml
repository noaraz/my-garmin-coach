previews:
  generation: manual

services:
  - type: web
    name: garmincoach
    runtime: docker
    dockerfilePath: ./Dockerfile.prod
    plan: free
    autoDeploy: false
    port: 8000
    healthCheckPath: /api/v1/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GARMINCOACH_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/garmincoach.db
      - key: CORS_ORIGINS
        value: https://garmincoach.onrender.com
      # DATABASE_URL: set manually in Render dashboard — points to Neon PostgreSQL.
      # Format: postgresql+asyncpg://user:pass@host.neon.tech/db?ssl=require
      # Do NOT commit the Neon connection string here (contains credentials).
      # Render free tier does not support persistent disks, so SQLite is not viable in prod.
