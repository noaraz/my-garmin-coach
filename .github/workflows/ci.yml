name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check src/ tests/

      - name: Tests
        working-directory: backend
        run: pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Dependency audit (pip-audit)
        working-directory: backend
        run: |
          pip install pip-audit
          # CVE-2024-23342: timing attack in ecdsa — transitive dep from garth, no fix version available
          # CVE-2026-4539: pygments — transitive dep, no fix version available yet
          pip-audit --local --ignore-vuln CVE-2024-23342 --ignore-vuln CVE-2026-4539

  frontend:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Dependency audit
        working-directory: frontend
        run: npm audit --audit-level=moderate

      - name: Tests
        working-directory: frontend
        run: npm run test:run

      - name: Build (tsc + vite)
        working-directory: frontend
        run: npm run build
