name: Preview DB — per-PR Neon branch

# Best-practice preview DB isolation:
#   - PR opened/updated/title-edited → create a fresh Neon branch for this PR,
#     update Render preview DATABASE_URL, trigger a clean deploy
#   - PR closed/merged → delete the Neon branch (cleanup)
#
# Only runs for PRs with [Render Preview] in the title — Render only creates
# preview services for those PRs (render.yaml: previews.generation: manual).
# Adding [Render Preview] to a PR title re-triggers the workflow via the
# `edited` event type.
#
# Each PR gets its own isolated Neon branch with a copy of prod data.
# Migrations run on the branch, never on prod.
#
# Race condition handling:
#   Render starts Deploy #1 immediately when the preview is created (copying prod DATABASE_URL).
#   This workflow cancels that deploy, updates DATABASE_URL, then triggers a fresh deploy.
#   Render's Docker build takes 3-5 min on a cold preview, so the container always
#   starts with the correct DATABASE_URL already in place.
#
# Required GitHub Secrets:
#   NEON_API_KEY     — Neon API key (neon.tech -> Account Settings -> API Keys)
#   NEON_PROJECT_ID  — Neon project ID (e.g. "rough-paper-73594330") — must be a Secret
#   RENDER_API_KEY   — Render API key (render.com -> Account Settings -> API Keys)
#
# See features/infrastructure/CLAUDE.md -> "Preview DB Isolation" for setup instructions.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed, edited]

jobs:
  # ── Create branch + update Render (on PR open/push/title edit) ──────────────
  setup-preview-db:
    name: Create Neon branch for PR
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && contains(github.event.pull_request.title, '[Render Preview]')
    steps:
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
          database: neondb
          username: neondb_owner

      - name: Build asyncpg-compatible DATABASE_URL
        id: db_url
        run: |
          # Neon outputs: postgresql://user:pass@host/db?sslmode=require&channel_binding=require
          # FastAPI needs: postgresql+asyncpg://user:pass@host/db?ssl=require
          RAW="${{ steps.neon.outputs.db_url_with_pooler }}"
          CONVERTED=$(echo "$RAW" \
            | sed 's|^postgresql://|postgresql+asyncpg://|' \
            | sed 's|sslmode=require|ssl=require|' \
            | sed 's|channel_binding=require||' \
            | sed 's|channel_binding=prefer||' \
            | sed 's|&&|&|g' \
            | sed 's|?&|?|g' \
            | sed 's|&$||')
          echo "::add-mask::$CONVERTED"
          echo "url=$CONVERTED" >> $GITHUB_OUTPUT
          echo "Branch URL ready (credentials masked)"

      - name: Find Render preview service for this PR
        id: render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          cat > /tmp/find_service.py << 'EOF'
          import sys, json, os
          data = json.load(sys.stdin)
          branch = os.environ['PR_BRANCH']
          for item in data:
              svc = item.get('service', item)
              if svc.get('branch') == branch:
                  print(svc['id'])
                  sys.exit(0)
          sys.exit(1)
          EOF

          # Poll up to 5 min — Render takes 1-2 min to create a preview service
          SERVICE_ID=""
          for i in $(seq 1 20); do
            SERVICES=$(curl -s \
              "https://api.render.com/v1/services?limit=50" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json")
            SERVICE_ID=$(echo "$SERVICES" | python3 /tmp/find_service.py || true)
            if [ -n "$SERVICE_ID" ]; then break; fi
            echo "Attempt $i/20: waiting for Render preview service... (15s)"
            sleep 15
          done

          if [ -z "$SERVICE_ID" ]; then
            echo "❌ Render preview service not found for branch '$PR_BRANCH' after 5 minutes."
            exit 1
          fi
          echo "✅ Found Render preview service: $SERVICE_ID"
          echo "service_id=$SERVICE_ID" >> $GITHUB_OUTPUT

      - name: Cancel any in-progress Render deploy
        continue-on-error: true
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ steps.render.outputs.service_id }}
        run: |
          DEPLOYS=$(curl -s \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys?limit=5" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json")

          DEPLOY_ID=$(echo "$DEPLOYS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          in_progress = {'build_in_progress', 'update_in_progress', 'pre_deploy_in_progress', 'created'}
          for item in data:
              d = item.get('deploy', item)
              if d.get('status') in in_progress:
                  print(d['id'])
                  break
          " || true)

          if [ -n "$DEPLOY_ID" ]; then
            echo "Cancelling in-progress deploy $DEPLOY_ID..."
            curl -s -X POST \
              "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}/cancel" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Content-Type: application/json"
            echo "✅ Deploy cancelled"
          else
            echo "No in-progress deploy to cancel"
          fi

      - name: Update Render preview DATABASE_URL
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ steps.render.outputs.service_id }}
          PREVIEW_DATABASE_URL: ${{ steps.db_url.outputs.url }}
        run: |
          CURRENT=$(curl -s -f \
            "https://api.render.com/v1/services/${SERVICE_ID}/env-vars?limit=100" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json")

          cat > /tmp/update_db_url.py << 'EOF'
          import sys, json, os
          data = json.load(sys.stdin)
          preview_url = os.environ['PREVIEW_DATABASE_URL']
          clean = []
          found = False
          for item in data:
              env = item.get('envVar', item)
              entry = {'key': env['key'], 'value': env['value']}
              if env['key'] == 'DATABASE_URL':
                  entry['value'] = preview_url
                  found = True
              clean.append(entry)
          # Inject DATABASE_URL if the preview service doesn't have it yet
          if not found:
              clean.append({'key': 'DATABASE_URL', 'value': preview_url})
          print(json.dumps(clean))
          EOF

          UPDATED=$(echo "$CURRENT" | python3 /tmp/update_db_url.py)

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://api.render.com/v1/services/${SERVICE_ID}/env-vars" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$UPDATED")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ DATABASE_URL updated to Neon branch preview/pr-${{ github.event.number }}"
          else
            echo "❌ Failed to update env vars (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Trigger Render preview deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: ${{ steps.render.outputs.service_id }}
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"deployMode": "build_and_deploy"}')

          if [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "202" ]; then
            echo "✅ Render preview deploy triggered"
            echo "   Container will run: alembic upgrade head (on Neon branch preview/pr-${{ github.event.number }})"
          else
            echo "❌ Failed to trigger deploy (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Delete Neon branch on workflow failure (cleanup orphan)
        if: failure()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          # Look up branch ID by name then delete — branch name with slashes
          # is not reliably resolved by delete-branch-action, so use API directly.
          BRANCH_ID=$(curl -s \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          pr = 'preview/pr-${{ github.event.number }}'
          for b in data.get('branches', []):
              if b['name'] == pr:
                  print(b['id'])
                  break
          " || true)
          if [ -n "$BRANCH_ID" ]; then
            curl -s -X DELETE \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
              -H "Authorization: Bearer ${NEON_API_KEY}"
            echo "✅ Orphaned Neon branch deleted: $BRANCH_ID"
          else
            echo "No Neon branch found to clean up"
          fi

  # ── Delete branch on PR close ────────────────────────────────────────────────
  cleanup-preview-db:
    name: Delete Neon branch for PR
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && contains(github.event.pull_request.title, '[Render Preview]')
    steps:
      - name: Delete Neon branch via API
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          # delete-branch-action@v3 silently fails to resolve branch names containing
          # slashes (e.g. preview/pr-86). Use the Neon API directly instead:
          # look up branch ID by name, then DELETE by ID.
          BRANCH_ID=$(curl -s \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          pr = 'preview/pr-${{ github.event.number }}'
          for b in data.get('branches', []):
              if b['name'] == pr:
                  print(b['id'])
                  break
          " || true)

          if [ -n "$BRANCH_ID" ]; then
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}" \
              -H "Authorization: Bearer ${NEON_API_KEY}")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Neon branch preview/pr-${{ github.event.number }} deleted"
            else
              echo "❌ Failed to delete branch (HTTP $HTTP_STATUS)"
              exit 1
            fi
          else
            echo "No Neon branch found for preview/pr-${{ github.event.number }} — already deleted or never created"
          fi
